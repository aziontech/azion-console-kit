name: Deploy Storybook

on:
  push:
    branches:
      - storybook
    paths:
      - 'src/storybook/**'

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GIT_PKG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          # registry-url: 'https://registry.npmjs.org'

      - name: Install workspace dependencies
        run: |
          cd storybook
          yarn install
          cd ..

      - name: Install Azion CLI
        run: |
          curl -o azionlinux https://downloads.azion.com/linux/x86_64/azion
          sudo mv azionlinux /usr/bin/azion
          sudo chmod u+x /usr/bin/azion

      - name: CLI version
        run: azion --version
        
      - name: Configure token
        run: |
          azion -t ${{ secrets.AZION_PERSONAL_TOKEN }}  
          azion whoami
      
      - name: Building Storybook
        working-directory: src/storybook
        run: |
          yarn storybook:build
          
      - name: Azion Deploy
        working-directory: src/storybook
        run: |
          yarn storybook:deploy