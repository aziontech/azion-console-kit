name: Run Linters And Checking Build Integrity
on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches:
      - dev
      - UXE-6333-real-time-event-improvement-fork
env:
  HUSKY: 0
jobs:
  eslint:
    runs-on: ubuntu-latest
    container:
      image: node:22-alpine
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install SO Dependencies
        run: apk add --no-cache curl bash git
      - name: Configure Git Safe Directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Fetch base branch for diff
        if: github.event_name == 'pull_request'
        working-directory: ${{ github.workspace }}
        run: git fetch origin ${{ github.base_ref }}
      - uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}
      - name: Install Dependencies
        run: yarn ci
      - name: Checking Build Integrity
        run: |
          echo "checking build integrity"
          yarn build
          rm -rf dist
          rm -rf coverage
      - name: Run ESLint
        run: yarn lint
      - name: Run Prettier Formatting
        run: yarn prettier --check src/
      - name: Architecture Lint (Changed Files)
        if: github.event_name == 'pull_request'
        run: yarn lint:architecture:changed --base origin/${{ github.base_ref }}
      - name: Architecture Conformance Report
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          yarn architecture:report --format markdown >> $GITHUB_STEP_SUMMARY
